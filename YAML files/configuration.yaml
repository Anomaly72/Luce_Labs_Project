# ==============================================================================
# INPUT HELPERS (Tuning Parameters & Simulation Triggers)
# ==============================================================================
input_number:
  target_temp:
    name: "Target Temperature"
    initial: 20
    min: 10
    max: 35
    step: 0.5
    unit_of_measurement: "°C"
    icon: mdi:thermometer

  target_humidity:
    name: "Target Humidity"
    initial: 60
    min: 30
    max: 90
    step: 1
    unit_of_measurement: "%"
    icon: mdi:water-percent

  temp_buffer:
    name: "Temperature Buffer"
    initial: 5
    min: 0.5
    max: 10
    step: 0.5
    unit_of_measurement: "°C"
    icon: mdi:arrow-collapse-down

  humidity_buffer:
    name: "Humidity Buffer"
    initial: 5
    min: 0.5
    max: 15
    step: 0.5
    unit_of_measurement: "%"
    icon: mdi:arrow-collapse-down

  # Simulated raw inputs (for testing without physical hardware)
  simulated_raw_temp:
    name: "Simulated Raw Temperature"
    initial: 22
    min: 10
    max: 40
    step: 0.1
    unit_of_measurement: "°C"

  simulated_raw_humidity:
    name: "Simulated Raw Humidity"
    initial: 65
    min: 20
    max: 100
    step: 0.5
    unit_of_measurement: "%"

# ==============================================================================
# LOWPASS MOVING-AVERAGE FILTERS
# Smoothing formula: averages raw readings over a rolling 2-second window
# ==============================================================================
sensor:
  - platform: filter
    name: "Filtered Temperature"
    entity_id: input_number.simulated_raw_temp  # Swap for physical sensor entity_id
    filters:
      - filter: time_simple_moving_average
        window_size: "00:00:02"
        precision: 2

  - platform: filter
    name: "Filtered Humidity"
    entity_id: input_number.simulated_raw_humidity  # Swap for physical sensor entity_id
    filters:
      - filter: time_simple_moving_average
        window_size: "00:00:02"
        precision: 2

# Simulated fan relay output (if you don't have a physical switch entity yet)
input_boolean:
  exhaust_fan_state:
    name: "Exhaust Fan State"
    icon: mdi:fan